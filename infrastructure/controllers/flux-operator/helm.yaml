apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 2h
  chart:
    spec:
      chart: flux-operator
      version: ">= 0.1.0"
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
      interval: 2h
  install:
    disableWait: true
  upgrade:
    disableWait: true
