apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rancher-logging-crd
  namespace: cattle-logging-system
spec:
  interval: 2h
  chart:
    spec:
      chart: rancher-logging-crd
      version: '105.0.0+up4.8.0'
      sourceRef:
        kind: HelmRepository
        name: rancher-charts
        namespace: cattle-logging-system
      interval: 2h
  install:
    disableWait: true
  upgrade:
    disableWait: true
