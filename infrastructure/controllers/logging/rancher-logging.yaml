apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: rancher-charts
  namespace: cattle-logging-system
spec:
  interval: 24h
  url: https://charts.rancher.io
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: rancher-logging
  namespace: cattle-logging-system
spec:
  interval: 2h
  chart:
    spec:
      chart: rancher-logging
      version: '105.0.0+up4.8.0' # Entspricht in etwa der Rancher 2.9/2.10 Version
      sourceRef:
        kind: HelmRepository
        name: rancher-charts
        namespace: cattle-logging-system
      interval: 2h
  values:
    additionalLoggingSources:
      rke2:
        enabled: true
      k3s:
        enabled: true
