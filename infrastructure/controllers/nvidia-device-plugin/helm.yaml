---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  interval: 24h
  url: https://nvidia.github.io/k8s-device-plugin
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.17.0"
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
        namespace: kube-system
      interval: 12h
  values:
    nodeSelector:
      kubernetes.io/hostname: k3s03
    affinity:
      nodeAffinity: null
