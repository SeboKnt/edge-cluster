apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: falcosecurity
  namespace: security
spec:
  interval: 24h
  url: https://falcosecurity.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 2h
  chart:
    spec:
      chart: falco
      version: 4.8.1
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: security
      interval: 2h
  values:
    driver:
      kind: ebpf
    tty: true
    falcosidekick:
      enabled: true
      webui:
        enabled: true
