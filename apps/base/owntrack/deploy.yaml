apiVersion: apps/v1
kind: Deployment
metadata:
  name: owntrack
  namespace: owntrack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: owntrack
  template:
    metadata:
      labels:
        app: owntrack
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          command: ['sh', '-c', 'chown -R 1000:1000 /store']
          volumeMounts:
            - name: store
              mountPath: /store
      containers:
        - name: otrecorder
          image: owntracks/recorder:latest
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: OTR_PORT
              value: "0"
          volumeMounts:
            - name: store
              mountPath: /store

        # Owntrack writes logs into file -> sidecar (Grafana Alloy)
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    sleep 5
                    curl -X POST "http://loki:3100/loki/api/v1/push" \
                      -H "Content-Type: application/json" \
                      -d "{\"streams\": [{\"stream\": {\"job\": \"startup\", \"container\": \"alloy\"}, \"values\": [[\"$(date +%s)000000000\", \"alloy started\"]]}]}"
          ##
          # check if loki received startup marker yet (duplicate detection)
          ###
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  END=$(date +%s)000000000
                  START=$((END - 2592000000000000)) # last 30 days
                  
                  RESPONSE=$(curl -sG "http://loki:3100/loki/api/v1/query_range" \
                    --data-urlencode 'query={job="startup"}' \
                    --data-urlencode "start=$START" \
                    --data-urlencode "end=$END" \
                    --data-urlencode "limit=10" 2>/dev/null)
                  
                  if [ -z "$RESPONSE" ]; then exit 0; fi
                  
                  STARTUP_COUNT=$(echo "$RESPONSE" | grep -o '\["[0-9]*","[^"]*"\]' | wc -l)
                  
                  if [ $STARTUP_COUNT -ge 2 ]; then
                    exit 1
                  fi
                  exit 0
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 60
            failureThreshold: 3
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy/config.alloy
              subPath: config.alloy
            - name: store
              mountPath: /store
              readOnly: true

        # Filebrowser to upload / migrate files
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          args:
            - --root=/srv
            - --database=/srv/.filebrowser.db
            - --address=0.0.0.0
            - --port=8080
          ports:
            - name: web
              containerPort: 8080
          volumeMounts:
            - name: store
              mountPath: /srv

      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
        - name: store
          persistentVolumeClaim:
            claimName: owntrack-store