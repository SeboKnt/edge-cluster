apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: owntrack
data:
  config.alloy: |
    local.file_match "owntracks" {
      path_targets = [{
        __path__ = "/store/rec/user/*/*.rec",
        job      = "owntracks",
      }]
    }

    loki.source.file "owntracks" {
      targets = local.file_match.owntracks.targets
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki:3100/loki/api/v1/push"
      }
    }

    ##
    # Send a startup marker log entry once to verify loki is reachable
    ###
    local.exec "startup_marker" {
      command = "sh -c 'echo startup marker'"
      when    = flag.bool("flag.startup_marker", false, "Send startup marker once")
    }

    loki.source.syslog "startup" {
      listen_address = "127.0.0.1:10514"
      labels = {
        job = "startup",
      }
      forward_to = [loki.write.default.receiver]
    }
