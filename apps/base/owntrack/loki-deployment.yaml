apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: owntrack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      # loki is not allowd to write
      #initContainers:
      #  - name: fix-permissions
      #    image: busybox:latest
      #    command: ['sh', '-c', 'mkdir -p /loki /var/loki && chown -R 10001:10001 /loki /var/loki']
      #    volumeMounts:
      #      - name: data
      #        mountPath: /loki
      shareProcessNamespace: true
      containers:
        - name: loki
          image: grafana/loki:latest
          args:
            - -config.file=/etc/loki/loki-config.yaml
          ports:
            - name: http
              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki

        ##
        # check if loki received startup marker yet (duplicate detection)
        ###
        - name: loki-watchdog
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
          args:
            - |
              while true; do
                sleep 30
                END=$(date +%s)000000000
                START=$((END - 2592000000000000)) # last 30 days
                RESPONSE=$(curl -sG "http://localhost:3100/loki/api/v1/query_range" \
                  --data-urlencode 'query={job="startup"}' \
                  --data-urlencode "start=$START" \
                  --data-urlencode "end=$END" \
                  --data-urlencode "limit=100" 2>/dev/null || true)
                COUNT=$(echo "$RESPONSE" | grep -o '\["[0-9]*","[^"]*"\]' | wc -l)
                if [ "$COUNT" -ge 2 ]; then
                  echo "Duplicates detected: $COUNT entries. Killing Loki."
                  pkill -TERM loki || true
                fi
              done
      volumes:
        #- name: data
        #  persistentVolumeClaim:
        #    claimName: loki-data
        - name: config
          configMap:
            name: loki-config
